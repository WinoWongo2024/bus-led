<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern First Bus Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        led: {
                            bg: '#020202',
                            amber: '#ff8800',
                            red: '#ff1100',
                            dim: '#1a0e00',
                            panel: '#1e1e24'
                        }
                    },
                    fontFamily: {
                        matrix: ['DotGothic16', 'monospace']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .led-glow-amber {
                text-shadow: 0 0 6px rgba(255, 136, 0, 0.9), 0 0 12px rgba(255, 136, 0, 0.4);
            }
            .led-glow-red {
                text-shadow: 0 0 6px rgba(255, 17, 0, 0.9), 0 0 12px rgba(255, 17, 0, 0.4);
            }
            .smd-grid {
                background-image: radial-gradient(rgba(30, 15, 0, 0.65) 1.2px, transparent 1.2px);
                background-size: 3.5px 3.5px;
            }
            .full-marquee {
                display: inline-block;
                padding-left: 100%;
                animation: linearMarquee 10s linear infinite;
            }
            @keyframes linearMarquee {
                0% { transform: translateX(0); }
                100% { transform: translateX(-100%); }
            }
        }
    </style>
</head>
<body class="bg-neutral-950 min-h-screen flex flex-col items-center justify-center p-3 sm:p-6 font-matrix select-none">

    <!-- ULTRA WIDE INTERIOR LED HOUSING -->
    <div class="w-full max-w-4xl bg-led-panel p-4 rounded-xl shadow-[0_30px_70px_-15px_rgba(0,0,0,0.9)] border-4 border-neutral-800 relative">
        <div class="absolute inset-0 border border-white/5 rounded-lg pointer-events-none"></div>

        <!-- PHYSICAL MATRIX GLASS PANEL -->
        <div id="screenTapArea" class="w-full bg-led-bg rounded border-4 border-black p-3 h-32 relative overflow-hidden smd-grid flex flex-col justify-between cursor-pointer">
            
            <!-- BUS STOPPING OVERLAY LAYER -->
            <div id="bellBanner" class="absolute inset-0 bg-led-bg smd-grid flex items-center justify-center hidden z-30">
                <span class="text-4xl sm:text-5xl font-black text-led-red led-glow-red animate-pulse">🛑 BUS STOPPING</span>
            </div>

            <!-- VIEWPORT A: STATIC SYSTEM LAYOUT -->
            <div id="staticContainer" class="w-full h-full flex flex-col justify-between z-10">
                <div class="w-full text-center">
                    <span id="staticDestination" class="text-3xl sm:text-4xl font-extrabold text-led-amber led-glow-amber tracking-wide">INITIALISING...</span>
                </div>
                <div class="w-full text-center border-t border-led-dim pt-1 flex justify-between px-4 text-sm sm:text-base text-led-amber/60 font-sans">
                    <span id="metaRoute">SERVICE X39</span>
                    <span id="staticClock" class="font-matrix text-led-amber led-glow-amber text-xl sm:text-2xl -mt-1.5">12:00</span>
                </div>
            </div>

            <!-- VIEWPORT B: FULL WIDTH SCROLLING HOOD -->
            <div id="scrollContainer" class="w-full h-full flex items-center hidden z-20 overflow-hidden whitespace-nowrap">
                <span id="marqueeText" class="text-4xl sm:text-5xl font-bold text-led-amber led-glow-amber full-marquee">
                    GPS TRACKING ONLINE...
                </span>
            </div>

        </div>
    </div>

    <!-- AUDIO PROMPT AND METRIC TELEMETRY CARD -->
    <div class="w-full max-w-4xl mt-5 bg-neutral-900 rounded-xl p-4 border border-neutral-800 text-neutral-400 font-sans text-xs sm:text-sm">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-neutral-800 pb-3 mb-3">
            <div class="flex items-center gap-2 text-white font-bold uppercase text-xs">
                <span id="gpsDot" class="h-2 w-2 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="gpsStatusText">Awaiting Audio Activation Tap</span>
            </div>
            <button id="bellBtn" class="bg-red-600 hover:bg-red-500 active:scale-95 text-white font-bold px-4 py-1.5 rounded-full shadow-md transition-all uppercase tracking-wider text-xs">
                🔔 Press Bell
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div class="bg-black/40 p-2.5 rounded border border-neutral-800/50">
                <div class="text-[10px] text-neutral-500 uppercase tracking-wider">Line Network</div>
                <div class="font-bold text-white mt-0.5">X39 Aquae Express</div>
            </div>
            <div class="bg-black/40 p-2.5 rounded border border-neutral-800/50">
                <div class="text-[10px] text-neutral-500 uppercase tracking-wider">Next Station Point</div>
                <div id="teleNext" class="font-bold text-amber-500 mt-0.5 truncate">Searching Track...</div>
            </div>
            <div class="bg-black/40 p-2.5 rounded border border-neutral-800/50">
                <div class="text-[10px] text-neutral-500 uppercase tracking-wider">Distance Index</div>
                <div id="teleDist" class="font-bold text-white mt-0.5 font-mono">---</div>
            </div>
        </div>
    </div>

    <script>
        const MAIN_ROUTE = {
            service: "X39",
            finalDestination: "BATH BUS STATION",
            stops: [
                { id: 1, name: "Bristol Bus Station (Bay 12)", lat: 51.4584, lng: -2.5931 },
                { id: 2, name: "Temple Meads Station (Stop T1)", lat: 51.4496, lng: -2.5812 },
                { id: 3, name: "Totterdown, Three Lamps", lat: 51.4428, lng: -2.5715 },
                { id: 4, name: "Arnos Vale Cemetery", lat: 51.4398, lng: -2.5601 },
                { id: 5, name: "Brislington, Kensington Park", lat: 51.4362, lng: -2.5532 },
                { id: 6, name: "Brislington, Square", lat: 51.4312, lng: -2.5410 },
                { id: 7, name: "Brislington, Park & Ride Gate", lat: 51.4271, lng: -2.5290 },
                { id: 8, name: "Hicks Gate Roundabout", lat: 51.4215, lng: -2.5110 },
                { id: 9, name: "Keynsham, Ellsbridge House", lat: 51.4195, lng: -2.5015 },
                { id: 10, name: "Keynsham, The Centre", lat: 51.4178, lng: -2.4942 },
                { id: 11, name: "Keynsham, Memorial Park", lat: 51.4165, lng: -2.4918 },
                { id: 12, name: "Keynsham, Wellsway", lat: 51.4095, lng: -2.4820 },
                { id: 13, name: "Keynsham, Saltford Road", lat: 51.4051, lng: -2.4740 },
                { id: 14, name: "Saltford, Glenavon Farm", lat: 51.4022, lng: -2.4660 },
                { id: 15, name: "Saltford, The Brassmill", lat: 51.3998, lng: -2.4580 },
                { id: 16, name: "Saltford, Tyning Road", lat: 51.3975, lng: -2.4495 },
                { id: 17, name: "Saltford, The Crown Pub", lat: 51.3950, lng: -2.4410 },
                { id: 18, name: "Saltford, Grange Road", lat: 51.3920, lng: -2.4310 },
                { id: 19, name: "Newton St Loe, Globe Inn", lat: 51.3835, lng: -2.4170 },
                { id: 20, name: "Newbridge, Park & Ride Corner", lat: 51.3860, lng: -2.4010 },
                { id: 21, name: "Newbridge, Post Office", lat: 51.3842, lng: -2.3920 },
                { id: 22, name: "Bath, Chelsea Road", lat: 51.3821, lng: -2.3840 },
                { id: 23, name: "Bath, Windsor Bridge", lat: 51.3808, lng: -2.3750 },
                { id: 24, name: "Bath, Green Park Park", lat: 51.3792, lng: -2.3660 },
                { id: 25, name: "Bath, Bus Station Terminal", lat: 51.3781, lng: -2.3589 }
            ]
        };

        const SEPARATION_LIMIT_KM = 3.0;
        let audioUnlocked = false;
        let bellRung = false;
        let currentStopIndex = -1;
        let cyclicStage = 0; // 0 = Static Destination, 1 = Route Via List, 2 = Next Stop Sequence

        // Audio Handler
        function playBusChime(callback) {
            if (!audioUnlocked) { if(callback) callback(); return; }
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(554.37, ctx.currentTime);
                gain1.gain.setValueAtTime(0.12, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start();
                osc1.stop(ctx.currentTime + 0.35);

                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, ctx.currentTime);
                    gain2.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.5);
                    
                    setTimeout(() => { if(callback) callback(); }, 450);
                }, 180);
            } catch (e) {
                if(callback) callback();
            }
        }

        function announceNextStop(stopName) {
            if (!audioUnlocked || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(`Next stop, ${stopName}`);
            utterance.lang = 'en-GB';
            utterance.rate = 0.94;
            window.speechSynthesis.speak(utterance);
        }

        // Haversine Equation
        function calcKmDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // Hardware Screen Multiplexer Engine
        function matrixScreenRefresh() {
            const staticView = document.getElementById('staticContainer');
            const scrollView = document.getElementById('scrollContainer');
            const destLabel = document.getElementById('staticDestination');
            const scrollLabel = document.getElementById('marqueeText');

            if (currentStopIndex === -1) {
                staticView.classList.remove('hidden');
                scrollView.classList.add('hidden');
                destLabel.textContent = "SEARCHING TRACK...";
                return;
            }

            const isLastStop = (currentStopIndex === MAIN_ROUTE.stops.length - 1);
            const nextStop = isLastStop ? null : MAIN_ROUTE.stops[currentStopIndex + 1];

            // Clean View Swap Interceptor
            if (cyclicStage === 0) {
                // View Mode A: Non-scrolling Destination Title + Time Clock Frame
                scrollView.classList.add('hidden');
                staticView.classList.remove('hidden');
                destLabel.textContent = MAIN_ROUTE.finalDestination;
            } else if (cyclicStage === 1) {
                // View Mode B: Full screen scrolling "via" text
                staticView.classList.add('hidden');
                scrollView.classList.remove('hidden');
                scrollLabel.textContent = "VIA KEYNSHAM * SALTFORD * NEWBRIDGE * NEWTON ST LOE";
            } else {
                // View Mode C: Full screen scrolling Next Arrival alert string
                staticView.classList.add('hidden');
                scrollView.classList.remove('hidden');
                if (nextStop) {
                    scrollLabel.textContent = `NEXT STOP: ${nextStop.name.toUpperCase()}`;
                } else {
                    scrollLabel.textContent = "TERMINAL STOP - PLEASE DISEMBARK";
                }
            }
        }

        function updateClockDisplay() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('staticClock').textContent = timeString;
        }

        // Live Coordinate Core Tracking Process
        function processCoordinatePosition(lat, lng) {
            let foundIndex = 0;
            let minimumDistance = Infinity;

            MAIN_ROUTE.stops.forEach((stop, i) => {
                const dist = calcKmDistance(lat, lng, stop.lat, stop.lng);
                if (dist < minimumDistance) {
                    minimumDistance = dist;
                    foundIndex = i;
                }
            });

            if (minimumDistance > SEPARATION_LIMIT_KM) {
                document.getElementById('staticDestination').textContent = "OFF ROUTE TRACK";
                return;
            }

            if (foundIndex !== currentStopIndex) {
                currentStopIndex = foundIndex;
                bellRung = false;
                document.getElementById('bellBanner').classList.add('hidden');
                
                if (currentStopIndex < MAIN_ROUTE.stops.length - 1) {
                    const cleanName = MAIN_ROUTE.stops[currentStopIndex + 1].name.split("(")[0];
                    playBusChime(() => {
                        announceNextStop(cleanName);
                    });
                }
                matrixScreenRefresh();
            }

            const nextNode = (currentStopIndex < MAIN_ROUTE.stops.length - 1) ? MAIN_ROUTE.stops[currentStopIndex + 1] : MAIN_ROUTE.stops[currentStopIndex];
            document.getElementById('teleNext').textContent = nextNode.name;
            document.getElementById('teleDist').textContent = minimumDistance < 1 ? `${Math.round(minimumDistance * 1000)}m` : `${minimumDistance.toFixed(2)} km`;
        }

        // Interactive Interface Triggers
        function unlockAudioSystem() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            const dot = document.getElementById('gpsDot');
            const txt = document.getElementById('gpsStatusText');
            dot.className = "h-2 w-2 rounded-full bg-emerald-500 animate-ping";
            txt.textContent = "GPS Active & Audio Ready";
            playBusChime();
        }

        document.getElementById('screenTapArea').addEventListener('click', unlockAudioSystem);
        document.getElementById('bellBtn').addEventListener('click', () => {
            unlockAudioSystem();
            if (bellRung || currentStopIndex === -1) return;
            bellRung = true;
            
            document.getElementById('bellBanner').classList.remove('hidden');
            
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1150, ctx.currentTime);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e){}

            setTimeout(() => {
                document.getElementById('bellBanner').classList.add('hidden');
            }, 3500);
        });

        // Initialize Live GPS Hooks
        function startTrackingHardware() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(
                (pos) => {
                    if (!audioUnlocked) {
                        document.getElementById('gpsStatusText').textContent = "GPS Locked. Tap screen to enable audio.";
                    }
                    processCoordinatePosition(pos.coords.latitude, pos.coords.longitude);
                },
                (err) => {
                    const dot = document.getElementById('gpsDot');
                    dot.className = "h-2 w-2 rounded-full bg-red-500 animate-none";
                    document.getElementById('gpsStatusText').textContent = "GPS Connection Error";
                },
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 8000 }
            );
        }

        window.addEventListener('load', () => {
            startTrackingHardware();
            updateClockDisplay();
            matrixScreenRefresh();

            // Interval cycle routines
            setInterval(() => {
                cyclicStage = (cyclicStage + 1) % 3;
                matrixScreenRefresh();
            }, 6000);

            setInterval(updateClockDisplay, 1000);
        });
    </script>
</body>
</html>
